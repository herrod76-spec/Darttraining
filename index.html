<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DARTPRO M5 ULTIMATE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; background: #020617; color: #f8fafc; 
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; position: fixed; 
        }
        
        #global-home-btn {
            position: fixed; top: 20px; right: 20px; width: 70px; height: 70px;
            background: #1e293b; border: 2px solid #3b82f6; border-radius: 20px;
            display: none; align-items: center; justify-content: center; z-index: 1000000;
            cursor: pointer; -webkit-tap-highlight-color: transparent;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .screen { display: none; height: 100vh; padding: 20px; padding-top: 100px; flex-direction: column; overflow-y: auto; }
        .screen.active { display: flex; }
        
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; }
        
        .numpad-btn { 
            background: #1e293b; border-radius: 12px; font-weight: 900; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(255,255,255,0.05); font-size: 1.25rem;
        }
        .numpad-btn:active { background: #3b82f6; color: white; transform: scale(0.95); }
        .active-m { background: #3b82f6 !important; box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

        .game-card { transition: all 0.2s; cursor: pointer; border-bottom: 4px solid transparent; }
        .game-card:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <!-- HOME TRIGGER -->
    <div id="global-home-btn" onclick="goHome()">
        <svg width="32" height="32" fill="none" stroke="#3b82f6" stroke-width="3" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M9 22V12h6v10"/></svg>
    </div>

    <!-- MAIN MENU -->
    <div id="menu-screen" class="screen active">
        <div class="text-center mb-8">
            <h1 class="text-5xl font-900 italic text-blue-500 tracking-tighter">DARTPRO</h1>
            <p class="text-slate-500 font-black tracking-[0.6em] text-[10px]">M5 ULTIMATE SYSTEM</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 max-w-6xl mx-auto w-full pb-10">
            <!-- X01 -->
            <div class="glass p-6 h-48 flex flex-col justify-between border-blue-500 border-b-4">
                <h2 class="text-xl font-900 uppercase">X01 Match</h2>
                <div class="flex gap-2">
                    <select id="x01-val" class="bg-slate-800 rounded-xl px-4 font-black text-blue-400 text-lg border-none">
                        <option value="170">170</option><option value="301">301</option><option value="501" selected>501</option>
                    </select>
                    <button onclick="initGame('x01')" class="flex-1 bg-blue-600 rounded-xl font-900 text-sm uppercase py-3">Start</button>
                </div>
            </div>

            <!-- Ladder 50 -->
            <div onclick="initGame('ladder')" class="glass p-6 h-48 border-amber-500 border-b-4 game-card flex flex-col justify-center">
                <h2 class="text-2xl font-900 text-amber-500 uppercase">Ladder 50</h2>
                <p class="text-slate-400 text-xs mt-1 italic">Target-Checkout Training (Double Out)</p>
            </div>

            <!-- Around the Clock -->
            <div onclick="initGame('atc')" class="glass p-6 h-48 border-emerald-500 border-b-4 game-card flex flex-col justify-center">
                <h2 class="text-2xl font-900 text-emerald-500 uppercase">Around Clock</h2>
                <p class="text-slate-400 text-xs mt-1 italic">Treffe alle Felder von 1 bis Bull</p>
            </div>

            <!-- Bob's 27 -->
            <div onclick="initGame('bob27')" class="glass p-6 h-48 border-rose-500 border-b-4 game-card flex flex-col justify-center">
                <h2 class="text-2xl font-900 text-rose-500 uppercase">Bob's 27</h2>
                <p class="text-slate-400 text-xs mt-1 italic">Überlebe die Double-Chain</p>
            </div>

            <!-- Cricket -->
            <div onclick="initGame('cricket')" class="glass p-6 h-48 border-violet-500 border-b-4 game-card flex flex-col justify-center">
                <h2 class="text-2xl font-900 text-violet-500 uppercase">Cricket</h2>
                <p class="text-slate-400 text-xs mt-1 italic">Klassik-Taktik 15-20 & Bull</p>
            </div>

            <!-- Score Training -->
            <div onclick="initGame('score')" class="glass p-6 h-48 border-cyan-500 border-b-4 game-card flex flex-col justify-center">
                <h2 class="text-2xl font-900 text-cyan-500 uppercase">100 Darts Score</h2>
                <p class="text-slate-400 text-xs mt-1 italic">Maximiere deinen Punkteschnitt</p>
            </div>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <div class="flex justify-center mb-4">
            <div class="glass px-10 py-3 border-2 border-blue-500 text-center min-w-[200px]">
                <div id="p-label" class="text-[10px] font-black text-slate-500 uppercase">Spieler 1</div>
                <div id="p-score-small" class="text-2xl font-900">501</div>
            </div>
        </div>

        <div class="flex-1 grid grid-cols-12 gap-6 overflow-hidden">
            <!-- DISPLAY -->
            <div class="col-span-12 lg:col-span-5 flex flex-col gap-4">
                <div class="glass flex-1 flex flex-col items-center justify-center relative p-8 text-center">
                    <div id="top-hint" class="absolute top-8 font-black text-slate-500 text-[10px] tracking-widest uppercase">Target</div>
                    <div id="main-val" class="text-[140px] font-900 leading-none tracking-tighter">501</div>
                    <div id="sub-info" class="mt-4 text-blue-400 font-black text-xl uppercase tracking-widest"></div>
                    
                    <!-- Cricket Grid -->
                    <div id="cricket-ui" class="w-full mt-6 grid grid-cols-7 gap-1 hidden"></div>
                </div>
            </div>

            <!-- INPUT -->
            <div class="col-span-12 lg:col-span-7 flex flex-col gap-3">
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="m('S')" id="mb-S" class="numpad-btn h-14 active-m">SINGLE</button>
                    <button onclick="m('D')" id="mb-D" class="numpad-btn h-14">DOUBLE</button>
                    <button onclick="m('T')" id="mb-T" class="numpad-btn h-14">TRIPLE</button>
                </div>
                <div class="grid grid-cols-7 gap-1.5 flex-1">
                    <script>
                        for(let i=1; i<=20; i++) document.write(`<button onclick="hit(${i})" class="numpad-btn">${i}</button>`);
                    </script>
                    <button onclick="hit(25)" class="numpad-btn col-span-2 bg-rose-600/10 text-rose-500">BULL</button>
                    <button onclick="hit(0)" class="numpad-btn bg-slate-800 text-slate-600">0</button>
                    <button onclick="undo()" class="numpad-btn bg-white/5 text-[10px] uppercase">Undo</button>
                </div>
                <div class="h-28 flex gap-3">
                    <div class="flex-1 glass flex items-center justify-around text-3xl font-black text-blue-400">
                        <span id="d1">-</span><span id="d2">-</span><span id="d3">-</span>
                    </div>
                    <button onclick="ok()" class="w-48 bg-blue-600 rounded-2xl font-900 text-3xl shadow-xl">OK</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let s = {
            mode: '', score: 0, mult: 'S', turn: [], target: 1, 
            darts: 0, cricket: {}, start: 501
        };

        function goHome() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
            document.getElementById('global-home-btn').style.display = 'none';
        }

        function initGame(m) {
            s.mode = m; s.turn = []; s.mult = 'S'; s.darts = 0; s.target = 1;
            s.start = parseInt(document.getElementById('x01-val').value);

            if(m === 'x01') s.score = s.start;
            if(m === 'ladder') s.score = 50;
            if(m === 'bob27') s.score = 27;
            if(m === 'cricket') { s.score = 0; [20,19,18,17,16,15,25].forEach(v => s.cricket[v] = 0); }
            if(m === 'score') s.score = 0;
            if(m === 'atc') s.target = 1;

            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            document.getElementById('global-home-btn').style.display = 'flex';
            render();
        }

        function hit(n) {
            if(s.turn.length >= 3) return;
            let v = n; let l = s.mult + n;
            if(n === 25) { v = (s.mult === 'D') ? 50 : 25; l = (v === 50) ? 'DB' : 'SB'; }
            else { if(s.mult === 'D') v *= 2; if(s.mult === 'T') v *= 3; }
            if(n === 0) l = "X";
            s.turn.push({ v, l, m: s.mult, n });
            m('S');
            updateTurnUI();
        }

        function m(v) { s.mult = v; ['S','D','T'].forEach(k => document.getElementById('mb-'+k).classList.toggle('active-m', k === v)); }
        function undo() { s.turn.pop(); updateTurnUI(); }
        function updateTurnUI() { for(let i=1; i<=3; i++) { const e = document.getElementById('d'+i); e.innerText = s.turn[i-1] ? s.turn[i-1].l : '-'; e.style.opacity = s.turn[i-1] ? 1 : 0.2; } }

        function ok() {
            if(s.turn.length === 0) return;
            const sum = s.turn.reduce((a,b) => a + b.v, 0);

            if(s.mode === 'x01') {
                const rem = s.score - sum;
                if(rem === 0 && s.turn[s.turn.length-1].m === 'D') { alert("GEWONNEN!"); goHome(); return; }
                if(rem >= 2) s.score = rem;
                s.darts += s.turn.length;
            }
            else if(s.mode === 'ladder') {
                let cur = s.score; let win = false;
                for(let d of s.turn) {
                    cur -= d.v;
                    if(cur === 0 && d.m === 'D') { win = true; break; }
                    if(cur < 2) break;
                }
                if(win) s.score += 5; else s.score -= 1;
                if(s.score < 2) s.score = 2;
                s.darts += 3;
            }
            else if(s.mode === 'bob27') {
                const h = s.turn.filter(d => d.n === s.target && d.m === 'D').length;
                s.score += h > 0 ? (h * s.target * 2) : -(s.target * 2);
                s.target = (s.target === 20) ? 25 : s.target + 1;
                if(s.score <= 0 || s.target > 25) { alert("Spiel Ende! Score: " + s.score); goHome(); return; }
            }
            else if(s.mode === 'atc') {
                s.turn.forEach(d => { if(d.n === s.target) s.target++; });
                if(s.target > 25) { alert("Fertig!"); goHome(); return; }
            }
            else if(s.mode === 'score') {
                s.score += sum; s.darts += 3;
                if(s.darts >= 99) { alert("Finaler Score: " + s.score); goHome(); return; }
            }
            else if(s.mode === 'cricket') {
                s.turn.forEach(d => {
                    if(s.cricket[d.n] !== undefined) {
                        let c = (d.m === 'T') ? 3 : (d.m === 'D' ? 2 : 1);
                        for(let i=0; i<c; i++) { if(s.cricket[d.n] < 3) s.cricket[d.n]++; else s.score += d.n; }
                    }
                });
            }

            s.turn = []; updateTurnUI(); render();
        }

        function render() {
            const mv = document.getElementById('main-val');
            const ps = document.getElementById('p-score-small');
            const lb = document.getElementById('top-hint');
            const si = document.getElementById('sub-info');
            const cu = document.getElementById('cricket-ui');

            cu.classList.add('hidden'); si.innerText = "";
            
            if(s.mode === 'x01') { mv.innerText = s.score; ps.innerText = s.score; lb.innerText = "Remaining"; }
            else if(s.mode === 'ladder') { mv.innerText = s.score; ps.innerText = "LADDER"; lb.innerText = "Target (Double Out)"; }
            else if(s.mode === 'bob27') { mv.innerText = s.target === 25 ? "BULL" : "D"+s.target; ps.innerText = s.score; lb.innerText = "Target Double"; si.innerText = "Score: " + s.score; }
            else if(s.mode === 'atc') { mv.innerText = s.target === 25 ? "BULL" : s.target; ps.innerText = "ATC"; lb.innerText = "Next Field"; }
            else if(s.mode === 'score') { mv.innerText = s.score; ps.innerText = s.darts + "/100"; lb.innerText = "Total Score"; si.innerText = "Avg: " + (s.darts > 0 ? (s.score / (s.darts/3)).toFixed(1) : "0.0"); }
            else if(s.mode === 'cricket') {
                mv.innerText = s.score; ps.innerText = "CRICKET"; lb.innerText = "Score";
                cu.classList.remove('hidden'); cu.innerHTML = '';
                [20,19,18,17,16,15,25].forEach(v => {
                    const h = s.cricket[v];
                    const m = h >= 3 ? '✕' : (h === 2 ? 'X' : (h === 1 ? '/' : ''));
                    cu.innerHTML += `<div class="glass p-1 text-center"><div class="text-[8px] text-slate-500">${v==25?'B':v}</div><div class="text-lg font-black ${h>=3?'text-emerald-500':''}">${m || '&nbsp;'}</div></div>`;
                });
            }
        }
    </script>
</body>
</html>

```
