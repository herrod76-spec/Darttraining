<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>DARTPRO M5 ELITE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap');
        :root { --bg: #030712; --card: #0f172a; --accent: #3b82f6; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #f8fafc; height: 100vh; overflow: hidden; margin: 0; }
        .glass-card { background: #0f172a; border: 1px solid rgba(255,255,255,0.05); border-radius: 40px; }
        .btn-game { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; }
        .btn-game:active { transform: scale(0.95); opacity: 0.8; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .connected .status-dot { background: #10b981; box-shadow: 0 0 15px #10b981; }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="flex flex-col h-full overflow-hidden">

    <header class="p-12 flex justify-between items-start">
        <div class="flex gap-5 items-center">
            <div class="text-blue-500 font-900 text-5xl tracking-tighter">DARTPRO</div>
            <div class="h-10 w-px bg-white/10 mx-2"></div>
            <div class="text-slate-500 text-[11px] font-black uppercase tracking-[0.4em] leading-tight text-left">M5 PROFESSIONAL<br>TRAINING SUITE</div>
        </div>
        <div class="flex items-center bg-white/5 px-8 py-3 rounded-full border border-white/5">
            <div class="status-dot mr-4"></div> 
            <span class="text-[10px] font-black uppercase opacity-60 tracking-widest">Autodarts Offline</span>
        </div>
    </header>

    <main id="view-menu" class="flex-1 px-12 space-y-12 pb-24 overflow-y-auto">
        <div class="glass-card p-10 max-w-4xl mx-auto">
            <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.5em] mb-8 text-center">Spieler Setup</h3>
            <div class="flex justify-center gap-5 mb-8">
                <button onclick="setPC(1)" id="b1" class="w-16 h-16 rounded-3xl font-black text-2xl bg-blue-600 text-white">1</button>
                <button onclick="setPC(2)" id="b2" class="w-16 h-16 rounded-3xl font-black text-2xl bg-slate-800 text-slate-500">2</button>
            </div>
            <input type="text" id="p1" value="Ich" class="bg-slate-900/80 p-6 rounded-3xl outline-none border border-white/5 text-xl w-full text-center focus:ring-2 ring-blue-500">
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8 max-w-7xl mx-auto">
            <div onclick="initGame('501')" class="glass-card btn-game p-12 h-64 flex flex-col justify-end border-l-[12px] border-blue-600">
                <span class="text-5xl font-900 tracking-tighter">501</span>
                <span class="text-sm text-slate-400 font-bold uppercase mt-3 tracking-widest text-left">Match Modus</span>
            </div>
            <div onclick="initGame('cricket')" class="glass-card btn-game p-12 h-64 flex flex-col justify-end border-l-[12px] border-emerald-500">
                <span class="text-5xl font-900 text-emerald-400 tracking-tighter text-left">CRICKET</span>
                <span class="text-sm text-slate-400 font-bold uppercase mt-3 tracking-widest text-left">Tactical</span>
            </div>
            <div onclick="initGame('ladder50')" class="glass-card btn-game p-12 h-64 flex flex-col justify-end border-l-[12px] border-indigo-600 text-left">
                <span class="text-5xl font-900 text-indigo-400 tracking-tighter">LADDER 50</span>
                <span class="text-sm text-slate-400 font-bold uppercase mt-3 tracking-widest">Peak Training</span>
            </div>
        </div>
    </main>

    <main id="view-game" class="hidden flex-1 px-12 space-y-10 pb-20">
        <div class="flex justify-between items-center">
            <button onclick="location.reload()" class="bg-slate-800/50 border border-white/5 px-10 py-4 rounded-3xl text-[11px] font-black uppercase tracking-widest">← Menü</button>
            <div id="gt" class="text-blue-500 font-black uppercase tracking-[0.5em] text-[11px] bg-blue-500/10 px-6 py-3 rounded-full border border-blue-500/20">MATCH</div>
        </div>
        <div class="text-center">
            <h2 id="up" class="text-6xl font-900 tracking-tighter">Spieler</h2>
        </div>
        <div class="max-w-4xl mx-auto text-center space-y-12">
            <div class="glass-card p-20 relative">
                <div id="um" class="text-[200px] font-900 tracking-tighter leading-none">0</div>
            </div>
            <div id="ia" class="flex flex-col gap-6"></div>
        </div>
    </main>

    <script>
        let score = 0;
        const $ = id => document.getElementById(id);
        function setPC(n) {
            $('b1').className = n===1 ? 'w-16 h-16 rounded-3xl font-black text-2xl bg-blue-600 text-white' : 'w-16 h-16 rounded-3xl font-black text-2xl bg-slate-800 text-slate-500';
            $('b2').className = n===2 ? 'w-16 h-16 rounded-3xl font-black text-2xl bg-blue-600 text-white' : 'w-16 h-16 rounded-3xl font-black text-2xl bg-slate-800 text-slate-500';
        }
        function initGame(m) {
            $('view-menu').classList.add('hidden');
            $('view-game').classList.remove('hidden');
            $('gt').innerText = m.toUpperCase();
            $('up').innerText = $('p1').value;
            if(m === '501') {
                score = 501;
                $('ia').innerHTML = `<input type="number" id="sc" class="bg-slate-900 p-10 rounded-[40px] text-7xl font-900 text-center outline-none border-4 border-white/5 focus:border-blue-500/50" placeholder="0" autofocus><button onclick="sub()" class="bg-blue-600 py-10 rounded-[40px] font-900 text-3xl uppercase btn-game">Senden</button>`;
            } else {
                score = 50;
                $('ia').innerHTML = `<div class="grid grid-cols-2 gap-8"><button onclick="score+=5;u()" class="bg-emerald-600 py-12 rounded-[40px] font-900 text-4xl btn-game">HIT</button><button onclick="score-=1;u()" class="bg-rose-600 py-12 rounded-[40px] font-900 text-4xl btn-game">MISS</button></div>`;
            }
            u();
        }
        function sub() { let v = parseInt($('sc').value) || 0; score -= v; $('sc').value = ''; u(); }
        function u() { $('um').innerText = score; }
    </script>
</body>
</html>
