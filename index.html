<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>DARTPRO M5 | AUTODARTS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { 
            font-family: 'Inter', sans-serif; background: #05070f; color: #f8fafc; 
            margin: 0; height: 100vh; width: 100vw; overflow: hidden; position: fixed; 
        }
        .screen { display: none; height: 100vh; padding: 30px; flex-direction: column; }
        .screen.active { display: flex; }
        .glass { background: rgba(13, 17, 29, 0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 24px; }
        .mode-card { 
            background: #0d111d; border-radius: 24px; border: 1px solid rgba(255,255,255,0.1);
            padding: 1.5rem; transition: all 0.2s; cursor: pointer;
            display: flex; flex-direction: column; justify-content: center; min-height: 140px;
        }
        .mode-card:active { transform: scale(0.98); background: #161b2c; }
        .numpad-btn { background: #161b2c; border-radius: 12px; font-weight: 900; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.03); }
        .numpad-btn:active { background: #3b82f6; color: white; }
        .active-m { background: #3b82f6 !important; color: white !important; }
        .status-bar { position: fixed; bottom: 20px; left: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

    <!-- MENU SCREEN -->
    <div id="menu-screen" class="screen active">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-900 italic text-blue-500 tracking-tighter">DARTPRO M5</h1>
            <p class="text-[10px] font-bold text-slate-500 uppercase tracking-[0.4em]">AUTODARTS LIVE SYNC</p>
        </div>

        <div class="max-w-5xl mx-auto w-full grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <div class="glass p-5">
                <label class="text-[9px] font-black text-slate-500 uppercase block mb-1">Board ID</label>
                <input type="text" id="ad-id" value="cc9ee524-f246-4ec3-a187-2fa288c408e2" class="bg-transparent border-none text-blue-400 font-bold text-lg w-full outline-none">
            </div>
            <div class="glass p-5 flex items-center gap-4">
                <div class="flex-1">
                    <label class="text-[9px] font-black text-slate-500 uppercase block mb-1">API Key</label>
                    <input type="password" id="ad-key" placeholder="••••••••" class="bg-transparent border-none text-blue-400 font-bold text-lg w-full outline-none">
                </div>
                <button onclick="saveAndConnect()" class="bg-blue-600 px-8 py-3 rounded-xl font-900 text-xs uppercase shadow-lg active:scale-95 transition-transform">Connect</button>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 max-w-6xl mx-auto w-full px-4">
            <div class="mode-card border-l-4 border-blue-600">
                <h2 class="text-xl font-900 uppercase">X01 Match</h2>
                <div class="flex gap-2 mt-4">
                    <select id="x01-sel" class="bg-slate-900 rounded-lg px-2 text-blue-400 font-bold outline-none text-sm"><option>301</option><option selected>501</option></select>
                    <button onclick="start('x01')" class="flex-1 bg-blue-600 rounded-xl font-900 text-[10px] py-3">START</button>
                </div>
            </div>
            <div onclick="start('ladder')" class="mode-card border-l-4 border-amber-500">
                <h2 class="text-xl font-900 uppercase text-amber-500">Ladder 50</h2>
                <p class="text-slate-500 text-[10px] mt-1">3 Darts Checkout (+5/-1)</p>
            </div>
            <div onclick="start('cricket')" class="mode-card border-l-4 border-violet-500">
                <h2 class="text-xl font-900 uppercase text-violet-500">Cricket</h2>
                <p class="text-slate-500 text-[10px] mt-1">Taktik: 15-20 & Bull</p>
            </div>
        </div>

        <div class="status-bar glass px-4 py-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-slate-600"></div>
            <span id="status-text" class="text-slate-500">Disconnected</span>
        </div>
    </div>

    <!-- GAME SCREEN -->
    <div id="game-screen" class="screen">
        <button onclick="goHome()" class="absolute top-8 left-8 p-3 glass z-50">
            <svg width="24" height="24" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="m15 18-6-6 6-6"/></svg>
        </button>

        <div class="flex-1 grid grid-cols-12 gap-8 max-w-7xl mx-auto w-full pt-10">
            <!-- Left Display -->
            <div class="col-span-12 lg:col-span-5 flex flex-col gap-6">
                <div class="glass flex-1 flex flex-col items-center justify-center relative p-10 overflow-hidden">
                    <div id="game-label" class="absolute top-10 text-[10px] font-black text-slate-500 uppercase tracking-[0.5em]">Target</div>
                    <div id="main-score" class="text-[180px] font-900 leading-none tracking-tighter text-white">50</div>
                    <div id="checkout-path" class="mt-8 text-blue-500 font-black text-4xl uppercase tracking-tighter">10, D20</div>
                    
                    <div id="cricket-ui" class="w-full mt-6 hidden space-y-2"></div>
                </div>
            </div>

            <!-- Right Controls -->
            <div class="col-span-12 lg:col-span-7 flex flex-col gap-4">
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setM('S')" id="m-S" class="numpad-btn h-14 active-m">SINGLE</button>
                    <button onclick="setM('D')" id="m-D" class="numpad-btn h-14">DOUBLE</button>
                    <button onclick="setM('T')" id="m-T" class="numpad-btn h-14">TRIPLE</button>
                </div>
                <div class="grid grid-cols-5 gap-2 flex-1">
                    <script>
                        for(let i=1; i<=20; i++) document.write(`<button onclick="hit(${i})" class="numpad-btn text-2xl">${i}</button>`);
                    </script>
                    <button onclick="hit(25)" class="numpad-btn bg-rose-600/10 text-rose-500">BULL</button>
                    <button onclick="hit(0)" class="numpad-btn bg-slate-800/40 text-slate-500 text-2xl">0</button>
                    <button onclick="undo()" class="numpad-btn text-[10px] uppercase text-slate-400">Undo</button>
                    <button onclick="confirmTurn()" class="numpad-btn col-span-2 bg-blue-600 text-white font-900 text-3xl shadow-xl shadow-blue-900/40">OK</button>
                </div>
                <div class="h-24 glass flex items-center justify-around">
                    <div class="flex gap-16 text-5xl font-900">
                        <span id="d1" class="text-slate-800">---</span>
                        <span id="d2" class="text-slate-800">---</span>
                        <span id="d3" class="text-slate-800">---</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let state = {
            mode: '', score: 0, mult: 'S', turn: [], target: 50, cricket: {}, ws: null
        };

        const checkouts = {
            50: "10, D20", 49: "9, D20", 55: "15, D20", 54: "14, D20", 60: "20, D20", 59: "19, D20",
            48: "8, D20", 47: "7, D20", 46: "6, D20", 45: "13, D16", 51: "11, D20", 52: "12, D20", 53: "13, D20",
            56: "16, D20", 57: "17, D20", 58: "18, D20"
        };

        function getCheckout(val) {
            if (checkouts[val]) return checkouts[val];
            if (val <= 40 && val % 2 === 0) return "D" + (val/2);
            return "";
        }

        function saveAndConnect() {
            const id = document.getElementById('ad-id').value.trim();
            const key = document.getElementById('ad-key').value.trim();
            localStorage.setItem('ad_id', id);
            localStorage.setItem('ad_key', key);
            connect(id, key);
        }

        function connect(id, key) {
            if(state.ws) state.ws.close();
            state.ws = new WebSocket(`wss://api.autodarts.io/ms/v1/boards/${id}/state?access_token=${key}`);
            
            state.ws.onopen = () => {
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]';
                document.getElementById('status-text').innerText = 'Connected';
                document.getElementById('status-text').className = 'text-green-500';
            };

            state.ws.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if(data.event === 'darts-thrown' || data.event === 'dart-thrown') {
                    const d = data.dart || data.darts[data.darts.length-1];
                    const m = d.multiplier === 2 ? 'D' : (d.multiplier === 3 ? 'T' : 'S');
                    setM(m); hit(d.value);
                }
                if(data.event === 'next-turn' && state.turn.length > 0) confirmTurn();
            };

            state.ws.onclose = () => {
                document.getElementById('status-dot').className = 'w-2 h-2 rounded-full bg-slate-600';
                document.getElementById('status-text').innerText = 'Disconnected';
                document.getElementById('status-text').className = 'text-slate-500';
                setTimeout(() => connect(id, key), 5000);
            };
        }

        function start(m) {
            state.mode = m; state.turn = []; state.mult = 'S';
            if(m === 'ladder') state.score = 50;
            if(m === 'x01') state.score = parseInt(document.getElementById('x01-sel').value);
            if(m === 'cricket') [20,19,18,17,16,15,25].forEach(s => state.cricket[s] = 0);
            
            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            render();
        }

        function hit(n) {
            if(state.turn.length >= 3) return;
            let val = n;
            let label = state.mult + n;
            if(n === 25) { val = state.mult === 'D' ? 50 : 25; label = val === 50 ? 'DB' : 'SB'; }
            else { if(state.mult === 'D') val *= 2; if(state.mult === 'T') val *= 3; }
            state.turn.push({ val, label, mult: state.mult, num: n });
            setM('S');
            updatePreview();
        }

        function confirmTurn() {
            if(state.turn.length === 0) return;
            
            if(state.mode === 'ladder') {
                let currentRem = state.score;
                let checked = false;
                
                for(let i=0; i<state.turn.length; i++) {
                    const d = state.turn[i];
                    if(currentRem - d.val === 0 && d.mult === 'D') {
                        checked = true; break;
                    }
                    currentRem -= d.val;
                    if(currentRem < 2) break; // Busted
                }

                if(checked) state.score += 5;
                else state.score -= 1;
            } else if(state.mode === 'x01') {
                const sum = state.turn.reduce((a,b) => a + b.val, 0);
                if(state.score - sum === 0 && state.turn[state.turn.length-1].mult === 'D') { alert("Win!"); goHome(); }
                else if(state.score - sum >= 2) state.score -= sum;
            }

            state.turn = [];
            updatePreview();
            render();
        }

        function setM(m) { state.mult = m; ['S','D','T'].forEach(k => document.getElementById('m-'+k).classList.toggle('active-m', k === m)); }
        function undo() { state.turn.pop(); updatePreview(); }
        function goHome() { document.getElementById('game-screen').classList.remove('active'); document.getElementById('menu-screen').classList.add('active'); }

        function updatePreview() {
            for(let i=1; i<=3; i++) {
                const e = document.getElementById('d'+i);
                e.innerText = state.turn[i-1] ? state.turn[i-1].label : '---';
                e.className = state.turn[i-1] ? 'text-blue-400' : 'text-slate-800';
            }
        }

        function render() {
            const mv = document.getElementById('main-score');
            const cp = document.getElementById('checkout-path');
            const lbl = document.getElementById('game-label');

            mv.innerText = state.score;
            cp.innerText = getCheckout(state.score);
            lbl.innerText = state.mode === 'ladder' ? "LADDER TARGET" : "REMAINING";
        }
    </script>
</body>
</html>
